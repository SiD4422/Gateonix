<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gateonix — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080a0e;
      --panel:   #0f1218;
      --surface: #161b24;
      --raised:  #1e2535;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --accent:  #00d4aa;
      --accent2: #00ffcc;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --danger:  #f87171;
      --success: #34d399;
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Background ── */
    .bg-grid { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .bg-grid svg { width: 100%; height: 100%; opacity: 0.045; }

    .orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,212,170,0.13) 0%, transparent 70%); top: -150px; right: -150px; animation-delay: 0s; }
    .orb2 { width: 380px; height: 380px; background: radial-gradient(circle, rgba(59,130,246,0.09) 0%, transparent 70%); bottom: -100px; left: -100px; animation-delay: -4s; }
    .orb3 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%); top: 40%; left: 10%; animation-delay: -2s; }
    @keyframes orbFloat { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,-20px) scale(1.05); } }

    /* ── Container ── */
    .container {
      position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    /* ── Logo ── */
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-mark {
      font-size: 38px; color: var(--accent); line-height: 1; margin-bottom: 8px; display: block;
      animation: pulse 2.4s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(0,212,170,0.35));
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.75;transform:scale(0.96)} }
    .logo-name { font-family: var(--font-ui); font-weight: 800; font-size: 30px; letter-spacing: -0.03em; color: var(--text); }
    .logo-tag  { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 5px; }

    /* ── Card ── */
    .card {
      background: var(--panel); border: 1px solid var(--border2); border-radius: 18px; padding: 32px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    /* ── Accessible Tabs ── */
    .tabs { display: flex; background: var(--surface); border-radius: 10px; padding: 3px; margin-bottom: 26px; }
    .tab {
      flex: 1; padding: 9px; text-align: center; font-family: var(--font-mono); font-size: 12px; font-weight: 500;
      color: var(--muted); cursor: pointer; border-radius: 7px; transition: all 0.2s; user-select: none;
      background: none; border: none; outline: none;
    }
    .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .tab.active { background: var(--raised); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
    .tab:not(.active):hover { color: var(--text); }

    /* ── Form Panels ── */
    .form-panel { display: none; flex-direction: column; gap: 14px; }
    .form-panel.active { display: flex; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .input-wrap { position: relative; }
    .field input {
      width: 100%; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border2);
      border-radius: 9px; color: var(--text); font-family: var(--font-mono); font-size: 13px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.13); }
    .field input.invalid { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
    .field input.valid   { border-color: var(--success); }
    .field input::placeholder { color: var(--muted); }
    .field input.has-toggle { padding-right: 42px; }

    /* ── Password Toggle ── */
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px; color: var(--muted);
      transition: color 0.15s; line-height: 0;
    }
    .pw-toggle:hover { color: var(--text); }
    .pw-toggle:focus-visible { outline: 2px solid var(--accent); border-radius: 4px; }
    .pw-toggle svg { width: 16px; height: 16px; }

    /* ── Inline field errors ── */
    .field-err { font-family: var(--font-mono); font-size: 10px; color: var(--danger); min-height: 14px; opacity: 0; transition: opacity 0.15s; }
    .field-err.show { opacity: 1; }

    /* ── Password strength bar ── */
    .pw-strength { display: flex; gap: 4px; margin-top: 4px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); transition: background 0.3s; }
    .pw-bar.weak   { background: #f87171; }
    .pw-bar.medium { background: #fbbf24; }
    .pw-bar.strong { background: #34d399; }

    /* ── Buttons ── */
    .btn-primary {
      padding: 13px; background: var(--accent); border: none; border-radius: 9px; color: #050e0b;
      font-family: var(--font-ui); font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; margin-top: 4px; letter-spacing: 0.02em;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,212,170,0.32); }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary:focus-visible { outline: 2px solid var(--accent2); outline-offset: 3px; }

    .divider { display: flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border2); }

    .btn-guest {
      padding: 11px; background: transparent; border: 1px solid var(--border2); border-radius: 9px;
      color: var(--muted); font-family: var(--font-mono); font-size: 12px; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .btn-guest:hover { border-color: rgba(255,255,255,0.22); color: var(--text); background: var(--surface); }
    .btn-guest:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    /* ── Rate limit notice ── */
    .rate-notice { font-family: var(--font-mono); font-size: 10px; color: var(--danger); text-align: center; margin-top: -6px; display: none; }
    .rate-notice.show { display: block; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(5,14,11,0.3); border-top-color: #050e0b;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    @media (max-height: 700px) { body { align-items: flex-start; padding: 20px 0; overflow-y: auto; } }
  </style>
</head>
<body>

<div class="bg-grid">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40 0H0V40" fill="none" stroke="white" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
    <g stroke="white" stroke-width="1" fill="none">
      <path d="M100 200 H300 V350 H500"/><path d="M500 350 H700 V200 H900"/>
      <circle cx="300" cy="200" r="3" fill="white"/><circle cx="500" cy="350" r="3" fill="white"/>
      <circle cx="700" cy="200" r="3" fill="white"/>
      <path d="M200 600 H400 V450 H600 V600 H800"/>
      <circle cx="400" cy="600" r="3" fill="white"/><circle cx="600" cy="450" r="3" fill="white"/>
      <path d="M900 400 H1050 V300"/><circle cx="1050" cy="300" r="3" fill="white"/>
      <path d="M50 500 V350 H150"/><circle cx="150" cy="350" r="3" fill="white"/>
    </g>
  </svg>
</div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
  <div class="logo">
    <span class="logo-mark">⬡</span>
    <div class="logo-name">Gateonix</div>
    <div class="logo-tag">Digital Circuit Simulator</div>
  </div>

  <div class="card">
    <div class="tabs" role="tablist" aria-label="Authentication">
      <button class="tab active" role="tab" aria-selected="true"  aria-controls="panel-login"    id="tab-login"    data-tab="login">Login</button>
      <button class="tab"        role="tab" aria-selected="false" aria-controls="panel-register" id="tab-register" data-tab="register">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
      <div class="field">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" placeholder="Enter username" autocomplete="username" spellcheck="false"/>
        <span class="field-err" id="err-login-user" role="alert"></span>
      </div>
      <div class="field">
        <label for="login-pass">Password</label>
        <div class="input-wrap">
          <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" class="has-toggle"/>
          <button class="pw-toggle" type="button" aria-label="Show password" data-target="login-pass">
            <svg id="eye-login-pass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-err" id="err-login-pass" role="alert"></span>
      </div>
      <div id="rate-notice" class="rate-notice" role="alert"></div>
      <button class="btn-primary" id="btn-login" type="button">Login →</button>
      <div class="divider">or</div>
      <button class="btn-guest" id="btn-guest" type="button">Continue as Guest</button>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
      <div class="field">
        <label for="reg-user">Username</label>
        <input type="text" id="reg-user" placeholder="At least 3 characters" autocomplete="username" spellcheck="false"/>
        <span class="field-err" id="err-reg-user" role="alert"></span>
      </div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email"/>
        <span class="field-err" id="err-reg-email" role="alert"></span>
      </div>
      <div class="field">
        <label for="reg-pass">Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-pass" placeholder="Min 8 characters" autocomplete="new-password" class="has-toggle"/>
          <button class="pw-toggle" type="button" aria-label="Show password" data-target="reg-pass">
            <svg id="eye-reg-pass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength" aria-hidden="true">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
        </div>
        <span class="field-err" id="err-reg-pass" role="alert"></span>
      </div>
      <div class="field">
        <label for="reg-pass2">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-pass2" placeholder="Repeat password" autocomplete="new-password" class="has-toggle"/>
          <button class="pw-toggle" type="button" aria-label="Show password" data-target="reg-pass2">
            <svg id="eye-reg-pass2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-err" id="err-reg-pass2" role="alert"></span>
      </div>
      <button class="btn-primary" id="btn-register" type="button">Create Account →</button>
    </div>
  </div>
</div>

<script>
// ── SHA-256 via Web Crypto API (no plain-text passwords) ──
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Rate limiting: max 5 attempts per 15 min ──
const RATE_KEY = 'lf_login_attempts', RATE_MAX = 5, RATE_WIN = 15 * 60 * 1000;
function getRateData()   { return JSON.parse(localStorage.getItem(RATE_KEY) || '{"count":0,"since":0}'); }
function isRateLimited() { const d = getRateData(); return Date.now() - d.since <= RATE_WIN && d.count >= RATE_MAX; }
function recordAttempt() {
  const d = getRateData(), now = Date.now();
  if (now - d.since > RATE_WIN) localStorage.setItem(RATE_KEY, JSON.stringify({count:1,since:now}));
  else { d.count++; localStorage.setItem(RATE_KEY, JSON.stringify(d)); }
}
function resetAttempts() { localStorage.removeItem(RATE_KEY); }
function minutesLeft()   { const d = getRateData(); return Math.ceil((RATE_WIN-(Date.now()-d.since))/60000); }

// ── User store ──
function getUsers()      { return JSON.parse(localStorage.getItem('lf_users') || '[]'); }
function saveUsers(u)    { localStorage.setItem('lf_users', JSON.stringify(u)); }
function setCurrentUser(u){ sessionStorage.setItem('lf_user', u); }

// ── Field error helpers ──
function setFieldErr(id, msg) {
  const err = document.getElementById('err-' + id);
  const inp = document.getElementById(id);
  if (err) { err.textContent = msg; err.classList.toggle('show', !!msg); }
  if (inp) { inp.classList.toggle('invalid', !!msg); if (msg) inp.classList.remove('valid'); }
}
function clearErr(id) { setFieldErr(id, ''); }
function setValid(id) {
  const inp = document.getElementById(id);
  if (inp) { inp.classList.remove('invalid'); inp.classList.add('valid'); }
  const err = document.getElementById('err-' + id);
  if (err) { err.textContent = ''; err.classList.remove('show'); }
}

// ── Email validation ──
function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e); }

// ── Password strength ──
function strength(p) {
  let s = 0;
  if (p.length >= 8) s++;
  if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
  if (/\d/.test(p)) s++;
  if (/[^A-Za-z0-9]/.test(p)) s++;
  return s <= 1 ? 'weak' : s <= 3 ? 'medium' : 'strong';
}
document.getElementById('reg-pass').addEventListener('input', function() {
  const s = this.value.length ? strength(this.value) : null;
  [['bar1',1],['bar2',2],['bar3',3]].forEach(([id,n]) => {
    const el = document.getElementById(id); el.className = 'pw-bar';
    if (s==='weak'   && n<=1) el.classList.add('weak');
    if (s==='medium' && n<=2) el.classList.add('medium');
    if (s==='strong' && n<=3) el.classList.add('strong');
  });
});

// ── Show/hide password toggle ──
const EYE_ON  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const EYE_OFF = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
document.querySelectorAll('.pw-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById(btn.dataset.target);
    const svg = document.getElementById('eye-' + btn.dataset.target);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    svg.innerHTML = show ? EYE_OFF : EYE_ON;
  });
});

// ── Accessible tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active'); tab.setAttribute('aria-selected','true');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    document.querySelectorAll('.field-err').forEach(e => { e.textContent=''; e.classList.remove('show'); });
    document.querySelectorAll('input').forEach(i => i.classList.remove('invalid','valid'));
  });
  tab.addEventListener('keydown', e => {
    const tabs = [...document.querySelectorAll('.tab')], idx = tabs.indexOf(tab);
    if (e.key==='ArrowRight' && tabs[idx+1]) { tabs[idx+1].focus(); tabs[idx+1].click(); }
    if (e.key==='ArrowLeft'  && tabs[idx-1]) { tabs[idx-1].focus(); tabs[idx-1].click(); }
  });
});

// ── LOGIN ──
document.getElementById('btn-login').addEventListener('click', async () => {
  const btn  = document.getElementById('btn-login');
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const rn   = document.getElementById('rate-notice');
  ['login-user','login-pass'].forEach(clearErr);
  rn.className = 'rate-notice';

  let ok = true;
  if (!user) { setFieldErr('login-user', 'Username is required.'); ok = false; }
  if (!pass) { setFieldErr('login-pass', 'Password is required.'); ok = false; }
  if (!ok)   return;

  if (isRateLimited()) {
    rn.textContent = `Too many failed attempts. Try again in ${minutesLeft()} min.`;
    rn.className = 'rate-notice show'; return;
  }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Checking…';
  const hash  = await sha256(pass);
  const found = getUsers().find(u => u.username === user && u.password === hash);
  await new Promise(r => setTimeout(r, 380));

  if (!found) {
    recordAttempt();
    const d = getRateData(), left = RATE_MAX - d.count;
    setFieldErr('login-pass', `Invalid credentials.${left > 0 ? ' '+left+' attempt'+(left!==1?'s':'')+' left.' : ''}`);
    btn.disabled = false; btn.innerHTML = 'Login →'; return;
  }

  resetAttempts(); setCurrentUser(user);
  btn.innerHTML = '✓ Welcome back!'; btn.style.background = 'var(--success)';
  setTimeout(() => window.location.href = 'index.html', 700);
});
['login-user','login-pass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-login').click(); });
});

// ── REGISTER ──
document.getElementById('btn-register').addEventListener('click', async () => {
  const btn   = document.getElementById('btn-register');
  const user  = document.getElementById('reg-user').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  ['reg-user','reg-email','reg-pass','reg-pass2'].forEach(clearErr);

  let ok = true;
  if (!user)              { setFieldErr('reg-user',  'Username is required.'); ok = false; }
  else if (user.length<3) { setFieldErr('reg-user',  'At least 3 characters.'); ok = false; }

  if (!email)             { setFieldErr('reg-email', 'Email is required.'); ok = false; }
  else if (!validEmail(email)) { setFieldErr('reg-email', 'Enter a valid email address.'); ok = false; }

  if (!pass)              { setFieldErr('reg-pass',  'Password is required.'); ok = false; }
  else if (pass.length<8) { setFieldErr('reg-pass',  'At least 8 characters.'); ok = false; }

  if (!pass2)             { setFieldErr('reg-pass2', 'Please confirm your password.'); ok = false; }
  else if (pass !== pass2){ setFieldErr('reg-pass2', 'Passwords do not match.'); ok = false; }
  if (!ok) return;

  const users = getUsers();
  if (users.find(u => u.username === user))  { setFieldErr('reg-user',  'Username already taken.'); return; }
  if (users.find(u => u.email    === email)) { setFieldErr('reg-email', 'Email already registered.'); return; }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Creating account…';
  const hash = await sha256(pass);
  users.push({ username: user, email, password: hash, createdAt: Date.now() });
  saveUsers(users); setCurrentUser(user);
  await new Promise(r => setTimeout(r, 450));
  btn.innerHTML = '✓ Account created!'; btn.style.background = 'var(--success)';
  setTimeout(() => window.location.href = 'index.html', 700);
});

// Real-time register hints
document.getElementById('reg-user').addEventListener('blur', function() {
  if (this.value.trim().length >= 3) setValid('reg-user');
});
document.getElementById('reg-email').addEventListener('blur', function() {
  if (validEmail(this.value.trim())) setValid('reg-email');
  else if (this.value.trim()) setFieldErr('reg-email', 'Enter a valid email address.');
});
document.getElementById('reg-pass2').addEventListener('input', function() {
  const p1 = document.getElementById('reg-pass').value;
  if (this.value && this.value === p1) setValid('reg-pass2');
  else if (this.value)                 setFieldErr('reg-pass2', 'Passwords do not match.');
});

// ── Guest ──
document.getElementById('btn-guest').addEventListener('click', () => {
  setCurrentUser('Guest'); window.location.href = 'index.html';
});

// Already logged in → skip
if (sessionStorage.getItem('lf_user')) window.location.href = 'index.html';
</script>
</body>
</html>
